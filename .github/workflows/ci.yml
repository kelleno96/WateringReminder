name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Build
        run: |
          xcodebuild build \
            -project WateringReminder.xcodeproj \
            -scheme WateringReminder \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project WateringReminder.xcodeproj \
            -scheme WateringReminder \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:WateringReminderTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
